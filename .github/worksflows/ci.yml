name: CI do Estoque da Eletrica

# O robô vai rodar sempre que você fizer um "push" (enviar código) para a branch principal
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # O robô vai usar um computador com Linux na nuvem

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" # Versão do Python que o robô vai usar

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rodar o Fiscal de Código (Flake8)
      run: |
        flake8 src tests

    - name: Rodar os Testes Automatizados (Pytest)
      run: |
        python -m pytest